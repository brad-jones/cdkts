[workspace]
channels = ["https://prefix.dev/brads-forge", "conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[tasks]
init = "task init"

[tasks.code]
depends-on = ["init"]
cmd = "code ."

[dependencies]
cocogitto = ">=6.5.0,<7"
deno = ">=2.7.1,<2.8"
dprint = ">=0.52.0,<0.53"
lefthook = ">=2.1.1,<3"
opentofu = ">=1.11.5,<2"
task = ">=3.48.0,<4"
terraform = ">=1.14.5,<2"
gh = ">=2.87.3,<3"
go = ">=1.26.0,<2"
